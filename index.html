<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neha's Mobile AI Translator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        textarea, select, button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans antialiased">

    <nav class="bg-slate-800 border-b border-slate-700 px-4 py-3 flex items-center justify-between shadow-md sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i data-lucide="globe" class="text-blue-500 w-5 h-5"></i>
            <span class="text-lg font-bold tracking-wide text-white">Neha's <span class="text-blue-400 text-xs font-medium">AI</span></span>
        </div>
        <span class="text-[10px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded-full border border-slate-600">v6.0 Live Gateway</span>
    </nav>

    <main class="flex-1 max-w-xl w-full mx-auto p-4 flex flex-col justify-start gap-4">
        
        <div class="text-center py-2">
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Neural Mobile Web Hub</h1>
            <p class="text-slate-400 text-xs mt-1">Deep Learning Translations via Groq Llama-3 Engine.</p>
        </div>

        <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-xl p-4 flex flex-col gap-4">
            
            <div class="flex items-center justify-between gap-2 bg-slate-900/40 p-1.5 rounded-xl border border-slate-700/40">
                <select id="sourceLang" class="w-2/5 bg-transparent text-white font-semibold text-sm outline-none px-2 py-1.5 cursor-pointer">
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Italian">Italian</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Arabic">Arabic</option>
                    <option value="Telugu">Telugu</option>
                </select>

                <button id="swapBtn" class="p-2 bg-slate-700 hover:bg-slate-600 active:scale-90 rounded-full transition text-blue-400" title="Swap Languages">
                    <i data-lucide="arrow-left-right" class="w-4 h-4"></i>
                </button>

                <select id="targetLang" class="w-2/5 bg-transparent text-white font-semibold text-sm outline-none px-2 py-1.5 cursor-pointer text-right">
                    <option value="Telugu">Telugu</option>
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Italian">Italian</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Arabic">Arabic</option>
                </select>
            </div>

            <div class="flex flex-col gap-3">
                <div class="bg-slate-900 border border-slate-700/60 rounded-xl p-3 flex flex-col gap-2 focus-within:border-blue-500/50 transition">
                    <textarea id="inputText" class="w-full h-32 bg-transparent text-white placeholder-slate-500 outline-none resize-none text-base leading-relaxed" placeholder="Tap to enter text..."></textarea>
                    <div class="flex justify-between items-center pt-2 border-t border-slate-800/60">
                        <button id="speakInput" class="p-2 hover:bg-slate-800 active:bg-slate-800 rounded-lg text-slate-400 hover:text-slate-200" title="Listen Input">
                            <i data-lucide="volume-2" class="w-4 h-4"></i>
                        </button>
                        <button id="translateBtn" class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-semibold px-4 py-1.5 rounded-lg text-xs transition shadow-md">
                            Translate
                        </button>
                    </div>
                </div>

                <div class="bg-slate-900/50 border border-slate-700/40 rounded-xl p-3 flex flex-col gap-2">
                    <div class="w-full h-32 overflow-y-auto text-base text-slate-200 leading-relaxed whitespace-pre-wrap">
                        <span id="outputTarget" class="text-slate-600 italic text-sm">Translations display here...</span>
                    </div>
                    <div class="flex justify-start gap-1 pt-2 border-t border-slate-800/60">
                        <button id="speakOutput" class="p-2 hover:bg-slate-800 active:bg-slate-800 rounded-lg text-slate-400" title="Listen Output">
                            <i data-lucide="volume-2" class="w-4 h-4"></i>
                        </button>
                        <button id="copyBtn" class="p-2 hover:bg-slate-800 active:bg-slate-800 rounded-lg text-slate-400" title="Copy Text">
                            <i data-lucide="copy" class="w-4 h-4" id="copyIcon"></i>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-slate-950 border-t border-slate-800 py-3 text-center text-[10px] text-slate-500 sticky bottom-0">
        © 2026 Neha's Translation Matrix Systems. Powered via Groq Cloud AI Engine.
    </footer>

    <script>
        lucide.createIcons();

        // Connected directly to your live Render backend URL
        const BACKEND_URL = "https://groq-translation-backend.onrender.com/translate";

        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const swapBtn = document.getElementById('swapBtn');
        const inputText = document.getElementById('inputText');
        const outputTarget = document.getElementById('outputTarget');
        const translateBtn = document.getElementById('translateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const copyIcon = document.getElementById('copyIcon');
        const speakInput = document.getElementById('speakInput');
        const speakOutput = document.getElementById('speakOutput');

        let activeTranslation = "";

        const ttsLanguageMap = {
            "English": "en", "Spanish": "es", "French": "fr", "German": "de", 
            "Italian": "it", "Japanese": "ja", "Chinese": "zh", "Hindi": "hi", 
            "Arabic": "ar", "Telugu": "te"
        };

        async function performTranslation() {
            const query = inputText.value.trim();
            if (!query) return;

            translateBtn.innerText = "Processing...";
            translateBtn.disabled = true;

            try {
                const res = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        // Switched to a higher tier model with better Telugu accuracy
                        model: "llama-3.3-70b-versatile", 
                        messages: [
                            {
                                role: "system",
                                content: `You are an expert conversational translator. Translate text from ${sourceLang.value} to ${targetLang.value}. 
                                CRITICAL RULES:
                                1. Pay strict attention to who is performing the action (subject) and who is receiving it (object). Do not swap pronouns. (e.g., "I hate you" means the speaker hates the listener: "నేనంటే నీకు ఇష్టం లేదు" or "నేను నిన్ను ద్వేషిస్తున్నాను").
                                2. Provide ONLY the natural, everyday spoken translation output text. No explanations, no markdown formatting, and no extra quotes.`
                            },
                            {
                                role: "user",
                                content: query
                            }
                        ],
                        temperature: 0.0
                    })
                });
                const data = await res.json();
                
                if (data && data.choices && data.choices[0]) {
                    activeTranslation = data.choices[0].message.content.trim();
                    outputTarget.textContent = activeTranslation;
                    outputTarget.classList.remove('text-slate-600', 'italic', 'text-sm');
                } else {
                    outputTarget.textContent = "Error parsing response framework from backend.";
                }
            } catch (err) {
                outputTarget.textContent = "Backend communication error.";
                console.error(err);
            } finally {
                translateBtn.innerText = "Translate";
                translateBtn.disabled = false;
            }
        }        
        
        function handleSpeech(text, langName) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const langCode = ttsLanguageMap[langName] || 'en';
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode;
            window.speechSynthesis.speak(utterance);
        }

        speakInput.addEventListener('click', () => {
            const text = inputText.value.trim();
            if (text) handleSpeech(text, sourceLang.value);
        });

        speakOutput.addEventListener('click', () => {
            if (activeTranslation) handleSpeech(activeTranslation, targetLang.value);
        });
    </script>
</body>
</html>
