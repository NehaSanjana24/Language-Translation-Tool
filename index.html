<main class="flex-1 max-w-xl w-full mx-auto p-4 flex flex-col justify-start gap-4">
        
        <div class="text-center py-2">
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Neural Mobile Web Hub</h1>
            <p class="text-slate-400 text-xs mt-1">Deep Learning Translations via Groq Llama-3 Engine.</p>
        </div>

        <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-xl p-4 flex flex-col gap-4">
            
            <div class="flex items-center justify-between gap-2 bg-slate-900/40 p-1.5 rounded-xl border border-slate-700/40">
                <select id="sourceLang" class="w-2/5 bg-transparent text-white font-semibold text-sm outline-none px-2 py-1.5 cursor-pointer">
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Italian">Italian</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Arabic">Arabic</option>
                    <option value="Telugu">Telugu</option>
                </select>

                <button id="swapBtn" class="p-2 bg-slate-700 hover:bg-slate-600 active:scale-90 rounded-full transition text-blue-400" title="Swap Languages">
                    <i data-lucide="arrow-left-right" class="w-4 h-4"></i>
                </button>

                <select id="targetLang" class="w-2/5 bg-transparent text-white font-semibold text-sm outline-none px-2 py-1.5 cursor-pointer text-right">
                    <option value="Telugu">Telugu</option>
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Italian">Italian</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Arabic">Arabic</option>
                </select>
            </div>

            <div class="flex flex-col gap-3">
                <div class="bg-slate-900 border border-slate-700/60 rounded-xl p-3 flex flex-col gap-2 focus-within:border-blue-500/50 transition">
                    <textarea id="inputText" class="w-full h-32 bg-transparent text-white placeholder-slate-500 outline-none resize-none text-base leading-relaxed" placeholder="Tap to enter text..."></textarea>
                    <div class="flex justify-between items-center pt-2 border-t border-slate-800/60">
                        <button id="speakInput" class="p-2 hover:bg-slate-800 active:bg-slate-800 rounded-lg text-slate-400 hover:text-slate-200" title="Listen Input">
                            <i data-lucide="volume-2" class="w-4 h-4"></i>
                        </button>
                        <button id="translateBtn" class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-semibold px-4 py-1.5 rounded-lg text-xs transition shadow-md">
                            Translate
                        </button>
                    </div>
                </div>

                <div class="bg-slate-900/50 border border-slate-700/40 rounded-xl p-3 flex flex-col gap-2">
                    <div class="w-full h-32 overflow-y-auto text-base text-slate-200 leading-relaxed whitespace-pre-wrap">
                        <span id="outputTarget" class="text-slate-600 italic text-sm">Translations display here...</span>
                    </div>
                </div>
            </div>

        </div>
    </main>
